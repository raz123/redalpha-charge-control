<!doctype html>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>RedAlpha Charge Control</title>
<style>
:root{color-scheme:dark;--bg:#0b1110;--card:#121c1a;--line:#263733;--text:#eef7f3;--muted:#9aaca6;--accent:#a8e66d;--accent2:#d8ffab;--danger:#ff9e88;--r:22px;--shadow:0 16px 40px #0005}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0,#193b2c 0,#0b1110 42%);font:16px/1.45 system-ui,-apple-system,sans-serif;color:var(--text)}main{width:min(100% - 32px,560px);margin:auto;padding:28px 0 40px}.eyebrow{color:var(--accent);font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}h1{margin:6px 0 4px;font-size:clamp(28px,8vw,42px);letter-spacing:-.04em}p{color:var(--muted);margin:0}.card{margin-top:24px;padding:22px;border:1px solid var(--line);border-radius:var(--r);background:#121c1add;box-shadow:var(--shadow);backdrop-filter:blur(16px)}.state{display:flex;align-items:center;gap:10px;margin-bottom:24px}.dot{width:11px;height:11px;border-radius:99px;background:var(--muted);box-shadow:0 0 0 5px #9aaca622}.dot.on{background:var(--accent);box-shadow:0 0 0 5px #a8e66d22}.state strong{display:block}.state small{display:block;color:var(--muted)}.row{display:flex;align-items:center;justify-content:space-between;gap:16px}label{font-weight:750}.value{display:flex;align-items:center;gap:8px}.value input{width:76px;text-align:center;font-weight:800;font-size:20px}input,button{font:inherit;color:var(--text);border:1px solid var(--line);border-radius:12px;background:#0c1412;padding:11px}input:focus,button:focus{outline:3px solid #a8e66d66;outline-offset:2px}input[type=range]{width:100%;height:8px;padding:0;margin:24px 0 4px;accent-color:var(--accent)}.scale{display:flex;justify-content:space-between;color:var(--muted);font-size:12px}.presets{display:flex;gap:8px;margin-top:18px}.presets button{flex:1;color:var(--accent2);cursor:pointer}.presets button:hover{border-color:var(--accent);background:#a8e66d18}.apply{width:100%;margin-top:20px;background:var(--accent);color:#17210f;border:0;font-weight:850;cursor:pointer}.apply:active{transform:translateY(1px)}.hint{margin-top:18px;font-size:13px;color:var(--muted)}.status{min-height:24px;margin-top:16px;color:var(--muted);white-space:pre-wrap}.status.error{color:var(--danger)}
</style>
<style>.state small{display:none!important}</style>
<main>
  <header><div class="eyebrow">RedAlpha • Power</div><h1>Charge Control</h1><p>Protect battery health with a configurable stop threshold.</p></header>
  <section class="card" aria-labelledby="setting-title">
    <div class="state"><i class="dot" id="dot"></i><div><strong id="state">Reading status…</strong><small id="path">Kernel interface</small></div></div>
    <div class="row"><label id="setting-title" for="percent">Charge limit</label><div class="value"><input id="percent" type="number" min="0" max="100" step="1" inputmode="numeric" aria-label="Charge limit percentage"><span>%</span></div></div>
    <input id="slider" type="range" min="0" max="100" step="1" aria-label="Charge limit slider"><div class="scale"><span>Off</span><span>50%</span><span>100%</span></div>
    <div class="presets"><button data-v="60">60%</button><button data-v="80">80%</button><button data-v="90">90%</button></div>
    <button class="apply" id="apply">Apply limit</button><div class="status" id="status" role="status" aria-live="polite"></div>
    <p class="hint">0 disables the limit. Charging resumes automatically 2 percentage points below the selected threshold.</p>
  </section>
</main>
<script type="module">
import {exec} from './kernelsu.js';
const $=s=>document.querySelector(s), percent=$('#percent'), slider=$('#slider'), status=$('#status'), dot=$('#dot'), state=$('#state'), pathLabel=$('#path');
let target='';
const setValue=v=>{percent.value=v;slider.value=v};
async function locate(){const r=await exec("find /sys/devices -type f -name redalpha_charge_limit 2>/dev/null | head -n 1");target=r.stdout.trim();if(!target)throw Error('Kernel interface not found. Flash the matching RedAlpha kernel first.');pathLabel.textContent=target;return target}
async function read(){try{const p=await locate(),r=await exec(`cat '${p}'`);if(r.errno)throw Error(r.stderr||'Read failed');const v=Number(r.stdout.trim());setValue(Number.isInteger(v)?v:0);const on=v>0;dot.classList.toggle('on',on);state.textContent=on?`Limit active at ${v}%`:'Limit disabled';status.textContent='';}catch(e){state.textContent='Unavailable';status.className='status error';status.textContent=e.message||String(e)}}
percent.oninput=()=>setValue(Math.max(0,Math.min(100,Number(percent.value)||0)));slider.oninput=()=>setValue(slider.value);document.querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>setValue(b.dataset.v));
$('#apply').onclick=async()=>{const v=Number(percent.value);if(!Number.isInteger(v)||v<0||v>100){status.className='status error';status.textContent='Enter a whole number from 0 to 100.';return}try{const p=target||await locate(),r=await exec(`mkdir -p /data/adb/redalpha-charge-control && printf '%s' '${v}' > /data/adb/redalpha-charge-control/limit && printf '%s' '${v}' > '${p}'`);if(r.errno)throw Error(r.stderr||'Apply failed');status.className='status';status.textContent=v?`Applied ${v}%. The kernel will resume below ${Math.max(0,v-2)}%.`:'Limit disabled; normal charging restored.';await read()}catch(e){status.className='status error';status.textContent=e.message||String(e)}};read();
</script>
