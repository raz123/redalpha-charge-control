<!doctype html>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RedAlpha Charge Control</title>
<style>:root{color-scheme:dark}body{font:16px system-ui;margin:24px;background:#111;color:#eee}main{max-width:520px;margin:auto}label{display:block;margin:20px 0 8px}input,button{font:inherit;padding:12px;border-radius:10px;border:1px solid #555}input{width:100%;box-sizing:border-box;background:#222;color:#fff}button{margin-top:18px;background:#9be15d;color:#111;border:0;font-weight:700}.status{margin-top:20px;padding:12px;background:#222;border-radius:10px;white-space:pre-wrap}</style>
<main><h1>RedAlpha Charge Control</h1><small>0 disables the limit.</small><label for="limit">Charge limit (%)</label><input id="limit" type="number" min="0" max="100" step="1" inputmode="numeric"><button id="save">Apply</button><div class="status" id="status">Reading…</div></main>
<script type="module">
import {exec} from './kernelsu.js';
const limit=document.querySelector('#limit'), status=document.querySelector('#status');
async function read(){try{const r=await exec("find /sys/devices -type f -name redalpha_charge_limit 2>/dev/null | head -n 1");const path=r.stdout.trim();if(!path)throw Error('Kernel interface not found.');const v=(await exec(`cat '${path}'`)).stdout.trim();limit.value=v||0;status.textContent=`Current: ${v||'unavailable'}%\nMaximum: 100%`;}catch(e){status.textContent=`Unable to read kernel interface.\n${e.message||e}`;}}
document.querySelector('#save').onclick=async()=>{const v=Number(limit.value);if(!Number.isInteger(v)||v<0||v>100){status.textContent='Enter an integer from 0 to 100.';return;}const r=await exec(`find /sys/devices -type f -name redalpha_charge_limit 2>/dev/null | head -n 1`),path=r.stdout.trim();if(!path){status.textContent='Kernel interface not found.';return;}const w=await exec(`mkdir -p /data/adb/redalpha-charge-control && printf '%s' '${v}' > /data/adb/redalpha-charge-control/limit && printf '%s' '${v}' > '${path}'`);status.textContent=w.errno?'Apply failed.':`Applied ${v}%.`;await read();};read();
</script>
